<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirill's Chess Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      padding: 50px;
      color: #fff;
    }

    .title {
      text-align: center;
      font-size: 2.8em;
      margin-bottom: 20px;
    }

    nav {
      text-align: center;
      margin-bottom: 40px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-size: 1.2em;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .content {
      text-align: center;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="title">Kirill's Chess Journey</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Profile</a>
      <a href="#">Tournaments</a>
      <a href="#">Results</a>
      <a href="#">Contact</a>
    </nav>
    <div class="content">
      Welcome to Kirill's Official Chess Site
    </div>
  </div>
</body>
</html>
