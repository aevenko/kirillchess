
<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>KirillChess</title>
</head>
<body>
<header>
<h1>Bienvenue sur le site de Kirill</h1>
</header>
<!-- Здесь будет вставлена таблица турниров -->

<section id="tournaments">
<h2>Tournois de Kirill</h2>
<table id="tournaments-table">
<thead>
<tr>
<th>Date</th>
<th>Tournoi</th>
<th>Cote Avant</th>
<th>Cote Après</th>
<th>Ville</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>
<footer>
<p>© 2025 KirillChess</p>
</footer>

<script>
fetch('/content/tournaments/tournaments.json')
  .then(response => response.json())
  .then(data => {
    const tbody = document.querySelector('#tournaments-table tbody');
    data.forEach(tournoi => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${tournoi.Date}</td>
        <td>${tournoi.Event}</td>
        <td>${tournoi.Before}</td>
        <td>${tournoi.After}</td>
        <td>${tournoi.City}</td>
      `;
      tbody.appendChild(row);
    });
  })
  .catch(error => {
    console.error('Erreur de chargement des tournois:', error);
  });
</script>
</body>
</html>
