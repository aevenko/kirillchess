backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://www.kirillchess.com

collections:
  - name: "profile"
    label: "Profile Page"
    files:
      - label: "Kirill’s Chess Profile"
        name: "profile"
        file: "profile.html"
        fields:
          - { label: "Intro Text", name: "body", widget: "markdown" }